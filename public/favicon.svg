<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Sotara favicon — arrow-A brand mark on navy
    Works at 16×16, 32×32, 48×48, 64×64
    Navy: #0A2847   Teal: #2DC4D4
  -->

  <!-- Navy rounded-square background -->
  <rect width="64" height="64" rx="13" fill="#0A2847"/>

  <!-- A: left leg (foot → apex) -->
  <line x1="12" y1="53" x2="28" y2="11"
        stroke="#2DC4D4" stroke-width="5.5" stroke-linecap="round"/>

  <!-- A: crossbar -->
  <line x1="16" y1="34" x2="40" y2="34"
        stroke="#2DC4D4" stroke-width="4.5" stroke-linecap="round"/>

  <!--
    Arrow: starts at A's right foot, rises straight up,
    sweeps upper-right — same motion as the Sotara wordmark
    M(43,53) C(43,26)(53,16)(57,10)
      start direction : straight up  ✓
      end direction   : ~37° above horizontal ✓
  -->
  <path d="M 43 53 C 43 26, 53 16, 57 10"
        stroke="#2DC4D4" stroke-width="5.5" fill="none" stroke-linecap="round"/>

  <!-- Arrowhead at (57,10), pointing ~37° above horizontal -->
  <polygon points="57,10 50,19 55,23" fill="#2DC4D4"/>
</svg>
