<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LeaveHub</title>

    <!-- PWA / App Meta -->
    <meta name="application-name" content="LeaveHub" />
    <meta name="description" content="Staff leave management platform powered by Sotara" />
    <meta name="theme-color" content="#0052a3" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LeaveHub" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- OG / Social -->
    <meta property="og:title" content="LeaveHub" />
    <meta property="og:description" content="Staff leave management platform" />
    <meta property="og:type" content="website" />

    <!-- Security headers via meta (belt-and-braces) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
